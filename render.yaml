services:
  - type: web
    name: pk-backend
    env: node
    region: oregon # Free-tier region; change to singapore for paid plan (closer to India)
    plan: free
    buildCommand: pnpm install --prod=false && pnpm build
    startCommand: pnpm start:render
    healthCheckPath: /healthz
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      # Linked automatically from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: paintkart-db
          property: connectionString

      # Generate a strong random secret on first deploy
      - key: JWT_SECRET
        generateValue: true

      # Set manually in the Render dashboard after first deploy
      - key: ADMIN_PASSCODE
        sync: false

      # Comma-separated list of allowed CORS origins, e.g. https://yourapp.com
      - key: CORS_ORIGIN
        sync: false

      # Set to s3 after AWS env vars below are configured.
      - key: STORAGE_DRIVER
        sync: false

      # Used only by local storage. S3 uses AWS_S3_PUBLIC_BASE_URL or bucket URL.
      - key: PUBLIC_BASE_URL
        value: https://api.paintcart.in

      - key: AWS_REGION
        sync: false

      - key: AWS_S3_BUCKET
        sync: false

      - key: AWS_ACCESS_KEY_ID
        sync: false

      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      # Optional: CloudFront/custom domain for returned S3 upload URLs.
      - key: AWS_S3_PUBLIC_BASE_URL
        sync: false

      # Keep false unless the bucket allows legacy object ACLs.
      - key: AWS_S3_PUBLIC_READ_ACL
        value: false

databases:
  - name: paintkart-db
    databaseName: paintkart
    plan: free
    region: oregon
